services:
  postgres:
    image: apache/age:PG16_latest
    environment:
      POSTGRES_DB: archmind
      POSTGRES_USER: archmind
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-archmind_dev}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres-init.sql:/docker-entrypoint-initdb.d/01-archmind-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U archmind"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:5000
      ConnectionStrings__Default: Host=postgres;Database=archmind;Username=archmind;Password=${POSTGRES_PASSWORD:-archmind_dev}
      Anthropic__ApiKey: ${ANTHROPIC_API_KEY}
    ports:
      - "5000:5000"
    volumes:
      - working_data:/var/archmind/workspaces
      - ./logs:/var/log/archmind

  admin-ui:
    build:
      context: ./admin-ui
      dockerfile: Dockerfile
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:5000
    ports:
      - "3000:3000"

volumes:
  postgres_data:
  working_data:
