services:
  postgres:
    image: apache/age:release_PG16_1.6.0
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-archmind}
      POSTGRES_USER: ${POSTGRES_USER:-archmind}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-archmind_dev}
    # DO-009: 5432 is exposed for local dev convenience (psql, smoke tests).
    # In production DO NOT publish this port to the host — restrict access
    # to the internal `archmind` network only by removing this `ports:` block.
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres-init.sql:/docker-entrypoint-initdb.d/01-archmind-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - archmind
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Development}
      ASPNETCORE_URLS: http://+:5000
      ConnectionStrings__Default: ${ConnectionStrings__Default:-Host=postgres;Port=5432;Database=archmind;Username=archmind;Password=${POSTGRES_PASSWORD:-archmind_dev}}
      Anthropic__ApiKey: ${Anthropic__ApiKey:-${ANTHROPIC_API_KEY}}
      Auth__RequireHttps: ${Auth__RequireHttps:-false}
      Cors__AllowedOrigins__0: ${Cors__AllowedOrigins__0:-http://localhost:3000}
      Logging__FilePath: ${Logging__FilePath:-/var/log/archmind}
      GitHub__AppId: ${GitHub__AppId:-}
      GitHub__InstallationId: ${GitHub__InstallationId:-}
      GitHub__PrivateKeyPath: ${GitHub__PrivateKeyPath:-/etc/archmind/github-app.pem}
      Polling__IntervalMinutes: ${Polling__IntervalMinutes:-15}
      AdminSeed__Email: ${AdminSeed__Email:-admin@archmind.local}
      AdminSeed__Password: ${AdminSeed__Password:-change-me-on-first-login}
    ports:
      - "5050:5000"
    volumes:
      - ./working:/var/archmind/workspaces
      - ./logs:/var/log/archmind
    # DO-008: give SSE/MCP streams 30s to drain on shutdown instead of the
    # default 10s SIGTERM → SIGKILL window.
    stop_grace_period: 30s
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - archmind
    restart: unless-stopped

  admin-ui:
    build:
      context: ./admin-ui
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:5050}
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:5050}
      INTERNAL_API_URL: http://backend:5000
    ports:
      - "3000:3000"
    networks:
      - archmind
    restart: unless-stopped

networks:
  archmind:
    driver: bridge

volumes:
  postgres_data:
